<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MOI — Premium Versatile Tops & Fashion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/moi-theme.css">
<style>
/* ================================================
   LOADING SCREEN — 1:1 from LoadingScreen.tsx
   ================================================ */
.moi-loader {
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#faf8f5;
  transition:opacity .6s cubic-bezier(.22,1,.36,1),visibility .6s;
}
.moi-loader--hidden { opacity:0;visibility:hidden;pointer-events:none }
.moi-loader__brand {
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:clamp(3.12rem,10vw,5.2rem);font-weight:300;letter-spacing:.12em;color:#1e1814;
  animation:loaderBrand .8s cubic-bezier(.22,1,.36,1) forwards;
  opacity:0;transform:translateY(8px);
}
.moi-loader__track {
  margin-top:24px;width:80px;height:2px;border-radius:999px;
  background:rgba(30,24,20,.08);overflow:hidden;
}
.moi-loader__shimmer {
  width:24px;height:100%;border-radius:999px;
  background:rgba(30,24,20,.28);
  animation:loaderShimmer 1.8s ease-in-out infinite;
}
.moi-loader__text {
  margin-top:20px;font-family:'Montserrat',sans-serif;
  font-size:9px;letter-spacing:.35em;text-transform:uppercase;
  color:rgba(30,24,20,.45);
  animation:loaderText .8s ease-out .4s forwards;opacity:0;
}
@keyframes loaderBrand { to { opacity:1;transform:translateY(0) } }
@keyframes loaderShimmer { 0%,100%{transform:translateX(-24px)} 50%{transform:translateX(80px)} }
@keyframes loaderText { to { opacity:.35 } }

/* ================================================
   PAGE TRANSITIONS — 1:1 from App.tsx AnimatePresence
   ================================================ */
.moi-app { transition:opacity .3s ease; }
.moi-app.is-exiting { opacity:0 }

/* ================================================
   CHECKOUT PAGE — Elegant card layout
   ================================================ */
.moi-checkout-page {
  min-height:100vh;background:#efe6da;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px 24px;
}
.moi-checkout-card {
  max-width:520px;width:100%;background:#faf8f5;border-radius:16px;
  padding:48px 32px;text-align:center;
  box-shadow:0 24px 80px rgba(20,16,12,.12);
  border:1px solid rgba(180,160,140,.18);
  animation:checkoutEnter .6s cubic-bezier(.22,1,.36,1) forwards;
  opacity:0;transform:translateY(20px);
}
@keyframes checkoutEnter { to { opacity:1;transform:translateY(0) } }
.moi-checkout-card__title {
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:clamp(1.8rem,5vw,2.8rem);font-weight:300;color:#1e1814;letter-spacing:.04em;margin-bottom:12px;
}
.moi-checkout-card__subtitle {
  font-family:'Montserrat',sans-serif;font-size:12px;letter-spacing:.18em;text-transform:uppercase;
  color:#8a7e74;margin-bottom:32px;
}
.moi-checkout-card__secure {
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:#7a6e74;margin-bottom:24px;
}
.moi-checkout-card__secure svg { width:14px;height:14px;opacity:.6 }
.moi-checkout-card__btn {
  display:inline-block;padding:16px 48px;
  background:#1e1814;color:#faf8f5;
  font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:.32em;text-transform:uppercase;
  border-radius:6px;border:none;cursor:pointer;transition:all .3s ease;
}
.moi-checkout-card__btn:hover { background:#2d231c;transform:scale(1.02) }
.moi-checkout-card__cards {
  display:flex;gap:12px;justify-content:center;margin-top:28px;opacity:.5;
}
.moi-checkout-card__cards span {
  font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#8a7e74;
}

/* ================================================
   DEMO PAGE SWITCHER
   ================================================ */
.moi-demo-nav {
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:90;
  display:flex;gap:8px;background:rgba(250,248,245,.92);backdrop-filter:blur(12px);
  padding:8px 16px;border-radius:999px;
  box-shadow:0 4px 20px rgba(20,16,12,.1);
  border:1px solid rgba(180,160,140,.18);
}
.moi-demo-nav button {
  font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  padding:8px 16px;border-radius:999px;background:transparent;color:#8a7e74;transition:all .2s ease;
}
.moi-demo-nav button.active { background:#1e1814;color:#faf8f5 }
.moi-demo-nav button:hover:not(.active) { background:rgba(30,24,20,.06) }

/* ================================================
   CART TOAST
   ================================================ */
.moi-cart-toast {
  position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:95;
  background:#1e1814;color:#fff;font-family:'Montserrat',sans-serif;
  font-size:11px;letter-spacing:.12em;padding:12px 24px;border-radius:6px;
  animation:toastIn .3s ease,toastOut .3s ease 2.2s forwards;white-space:nowrap;
}
@keyframes toastIn { from { opacity:0;transform:translateX(-50%) translateY(-10px) } to { opacity:1;transform:translateX(-50%) translateY(0) } }
@keyframes toastOut { from { opacity:1;transform:translateX(-50%) translateY(0) } to { opacity:0;transform:translateX(-50%) translateY(-10px) } }

/* ================================================
   LIGHTBOX
   ================================================ */
.moi-lightbox {
  position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;transition:opacity .4s ease,visibility .4s ease;
}
.moi-lightbox.is-open { opacity:1;visibility:visible }
.moi-lightbox__img { max-width:92vw;max-height:92vh;object-fit:contain;border-radius:4px;box-shadow:0 24px 80px rgba(0,0,0,.4);transform:scale(.95);transition:transform .4s cubic-bezier(.22,1,.36,1) }
.moi-lightbox.is-open .moi-lightbox__img { transform:scale(1) }
.moi-lightbox__close { position:absolute;top:24px;right:24px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s ease }
.moi-lightbox__close:hover { background:rgba(255,255,255,.2) }
.moi-lightbox__prev,.moi-lightbox__next { position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s ease }
.moi-lightbox__prev:hover,.moi-lightbox__next:hover { background:rgba(255,255,255,.2) }
.moi-lightbox__prev { left:24px } .moi-lightbox__next { right:24px }

/* ================================================
   PRODUCT PAGE STYLES
   ================================================ */
.moi-product-page__back { padding:80px 24px 12px }
.moi-product-page__back button { display:flex;align-items:center;gap:6px;font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:#8a7e74;transition:color .3s;background:none;border:none;cursor:pointer }
.moi-product-page__back button:hover { color:rgba(30,24,20,.85) }
.moi-product-page__back button svg { width:14px;height:14px }
.moi-product-page__layout { display:grid;grid-template-columns:1fr;max-width:1280px;margin:0 auto;padding:24px;gap:24px }
@media(min-width:768px){ .moi-product-page__layout { grid-template-columns:1fr 1fr;gap:48px;padding:48px } }
@media(min-width:1024px){ .moi-product-page__layout { gap:64px;padding:64px } }
.moi-product-page__gallery { display:flex;flex-direction:column;gap:16px }
.moi-product-page__gallery-main { position:relative;overflow:hidden;border-radius:12px;background:#fff;aspect-ratio:4/5;cursor:pointer }
@media(min-width:768px){ .moi-product-page__gallery-main { aspect-ratio:3/4 } }
.moi-product-page__gallery-main img { width:100%;height:100%;object-fit:cover;transition:opacity .4s ease }
.moi-product-page__gallery-hint { position:absolute;bottom:12px;right:12px;font-family:'Montserrat',sans-serif;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:rgba(30,24,20,.35) }
.moi-product-page__thumbs { display:flex;gap:8px;flex-wrap:wrap;justify-content:center }
.moi-product-page__thumb { width:64px;height:80px;overflow:hidden;border-radius:4px;cursor:pointer;transition:all .2s ease;background:#fff;border:none;padding:0 }
.moi-product-page__thumb img { width:100%;height:100%;object-fit:cover }

/* Info */
.moi-product-page__info { display:flex;flex-direction:column;gap:20px }
.moi-product-page__name { font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(1.77rem,7vw,3.12rem);font-weight:300;color:#1e1814;letter-spacing:.04em;line-height:1.1 }
.moi-product-page__stock { font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:.04em;color:#c83232;font-weight:500 }
.moi-product-page__price { display:flex;flex-direction:column;gap:2px }
.moi-product-page__price-current { font-family:'Montserrat',sans-serif;font-size:clamp(1.04rem,3vw,1.2rem);letter-spacing:.12em;color:#1e1814;font-weight:500;line-height:1.2 }
.moi-product-page__divider { width:100%;height:1px;background:rgba(180,160,140,.3) }
.moi-product-page__description { font-size:14px;line-height:1.75;color:#7a6e64;max-width:480px }
.moi-product-page__description ul { list-style:none;padding:0;margin:0 }
.moi-product-page__description li { display:flex;align-items:start;gap:12px;margin-bottom:8px }
.moi-product-page__description li span { width:6px;height:6px;border-radius:50%;background:rgba(30,24,20,.18);border:1px solid rgba(30,24,20,.2);flex-shrink:0;margin-top:8px }
.moi-product-page__color-label { font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#8a7e74;margin-bottom:12px }
.moi-product-page__swatches { display:flex;gap:10px;flex-wrap:wrap }
.moi-product-page__swatch { width:32px;height:32px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .3s ease;position:relative;flex-shrink:0 }
.moi-product-page__swatch:hover { transform:scale(1.1) }
.moi-product-page__swatch--active { border-color:#1e1814;box-shadow:0 0 0 2px rgba(30,24,20,.1) }
.moi-product-page__swatch-check { position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#1e1814 }
.moi-product-page__actions { display:flex;flex-direction:column;gap:12px }
.moi-product-page__btn { width:100%;padding:16px;font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:.35em;text-transform:uppercase;font-weight:500;color:#fff;background:#1e1814;border:none;border-radius:6px;cursor:pointer;transition:background .3s ease }
.moi-product-page__btn:hover { background:#2d231c }
.moi-product-page__btn--outline { background:transparent;color:#1e1814;border:1px solid #1e1814 }
.moi-product-page__btn--outline:hover { background:#1e1814;color:#fff }
.moi-product-page__btn--sold-out { background:#f0ece8;color:#a89e97;cursor:not-allowed }
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div class="moi-loader" id="moi-loader">
  <div class="moi-loader__brand">MOI</div>
  <div class="moi-loader__track"><div class="moi-loader__shimmer"></div></div>
  <p class="moi-loader__text">Loading</p>
</div>

<!-- CART DRAWER -->
<div class="moi-cart-drawer__overlay" id="moi-cart-overlay" onclick="closeCart()"></div>
<div class="moi-cart-drawer" id="moi-cart-drawer">
  <div class="moi-cart-drawer__header">
    <h3 class="moi-cart-drawer__title">Your Bag</h3>
    <button class="moi-cart-drawer__close" onclick="closeCart()" aria-label="Close cart">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="moi-cart-drawer__items" id="moi-cart-items">
    <div class="moi-cart-drawer__empty">
      <svg class="moi-cart-drawer__empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <p class="moi-cart-drawer__empty-text">Your bag is empty</p>
    </div>
  </div>
  <div class="moi-cart-drawer__footer">
    <div class="moi-cart-drawer__subtotal">
      <span class="moi-cart-drawer__subtotal-label">Total</span>
      <span id="moi-cart-total">0 EGP</span>
    </div>
    <button class="moi-cart-drawer__checkout-btn" onclick="goToCheckout()">Proceed to Checkout</button>
    <p class="moi-cart-drawer__note">Shipping & taxes calculated at checkout</p>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="moi-lightbox" id="moi-lightbox" onclick="closeLightbox(event)">
  <button class="moi-lightbox__close" onclick="closeLightbox(event)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
  </button>
  <button class="moi-lightbox__prev" onclick="lightboxPrev(event)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <button class="moi-lightbox__next" onclick="lightboxNext(event)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
  </button>
  <img class="moi-lightbox__img" id="moi-lightbox-img" src="" alt="">
</div>

<!-- MAIN APP -->
<div id="moi-app" class="moi-app"></div>

<!-- DEMO NAV -->
<div class="moi-demo-nav">
  <button class="active" onclick="switchPage('home')">Home</button>
  <button onclick="switchPage('product')">Product</button>
  <button onclick="switchPage('checkout')">Checkout</button>
</div>

<script>
// ================================================
// IMAGE ASSETS
// ================================================
const A={
  hero:'../artifacts/moi/public/hero-image.jpeg',
  white:'../artifacts/moi/public/images/white.jpg',
  wA1:'../artifacts/moi/public/images/IMG_1996_1778613360425-opt.jpg',
  wA2:'../artifacts/moi/public/images/IMG_1993_1778613360426-opt.jpg',
  cashmere:'../artifacts/moi/public/images/cashmere-main-new.jpg',
  cA1:'../artifacts/moi/public/images/cashmere-alt-1.jpg',
  cA2:'../artifacts/moi/public/images/cashmere-alt-2.jpg',
  cA3:'../artifacts/moi/public/images/cashmere-alt-3.jpg',
  beige:'../artifacts/moi/public/images/beige.jpg',
  bA1:'../artifacts/moi/public/images/beige-alt-1.jpg',
  bA2:'../artifacts/moi/public/images/beige-alt-2.jpg',
  bA3:'../artifacts/moi/public/images/beige-alt-3.jpg',
  yellow:'../artifacts/moi/public/images/yellow.jpg',
  yA1:'../artifacts/moi/public/images/yellow-alt-1.jpg',
  yA2:'../artifacts/moi/public/images/yellow-alt-2.jpg',
  teal:'../artifacts/moi/public/images/teal.jpg',
  tA1:'../artifacts/moi/public/images/teal-alt-1.jpg',
  tA2:'../artifacts/moi/public/images/teal-alt-2.jpg',
  tA3:'../artifacts/moi/public/images/teal-alt-3.jpg',
  lightBlue:'../artifacts/moi/public/images/light-blue.jpg',
  lbA1:'../artifacts/moi/public/images/light-blue-alt-1.jpg',
  lbA2:'../artifacts/moi/public/images/light-blue-alt-2.jpg',
  navy:'../artifacts/moi/public/images/navi.jpg',
  nA:'../artifacts/moi/public/images/navi-alt.jpg',
  mint:'../artifacts/moi/public/images/mint.jpg',
  mA1:'../artifacts/moi/public/images/mint-alt-1.jpg',
  mA2:'../artifacts/moi/public/images/mint-alt-2.jpg',
  bangles:'../artifacts/moi/public/images/bangles-main.jpg',
  baA1:'../artifacts/moi/public/images/bangles-alt-1.jpg',
  baA2:'../artifacts/moi/public/images/bangles-alt-2.jpg',
  baA3:'../artifacts/moi/public/images/bangles-alt-3.jpg',
  fsA:'../artifacts/moi/public/images/filmstrip-a.jpg',
  fsB:'../artifacts/moi/public/images/filmstrip-b.jpg',
  wL1:'../artifacts/moi/public/images/wavvy-look-1.jpg',
  wL2:'../artifacts/moi/public/images/wavvy-look-2.jpg',
  wL3:'../artifacts/moi/public/images/wavvy-look-3.jpg',
  wL4:'../artifacts/moi/public/images/wavvy-look-4.jpg',
  wL5:'../artifacts/moi/public/images/wavvy-look-5.jpg',
};

// ================================================
// PRODUCTS
// ================================================
const P={
  wavvy:{n:'MOI WAVVY',p:'899 EGP',d:'The ultimate throw-and-go. Effortless design, Wavy is light, breathable, and made for drifting.',db:['The ultimate throw-and-go piece.','Effortless design makes it easy to wear.','Wavy is light for all-day comfort.','Breathable fabric keeps you cool.','Made for drifting with ease.'],c:[
    {name:'Light Blue',img:A.lightBlue,g:[A.lightBlue,A.lbA1,A.lbA2],s:'#a8c8d8',sf:true},
    {name:'Navy',img:A.navy,g:[A.navy,A.nA],s:'#3a5a7a'},
    {name:'Mint',img:A.mint,g:[A.mint,A.mA1,A.mA2],s:'#98c8a8',so:true}
  ]},
  versa:{n:'MOI VERSA TOP',p:'1.399 EGP',d:'The signature wrap silhouette. Designed to drape beautifully, the Versa Top transitions effortlessly from day to night.',db:['The signature wrap silhouette.','Designed to drape beautifully.','Transitions effortlessly from day to night.','Light and comfortable for all-day wear.','A polished piece that elevates every look.'],c:[
    {name:'White',img:A.white,g:[A.white,A.wA1,A.wA2],s:'#f5f0e8'},
    {name:'Cashmere',img:A.cashmere,g:[A.cashmere,A.cA1,A.cA2,A.cA3],s:'#d4c4b0'},
    {name:'Beige',img:A.beige,g:[A.beige,A.bA1,A.bA2],s:'#c8b8a0'},
    {name:'Yellow',img:A.yellow,g:[A.yellow,A.yA1,A.yA2],s:'#e8d080'},
    {name:'Teal',img:A.teal,g:[A.teal,A.tA1,A.tA2,A.tA3],s:'#4a8a8a'}
  ]},
  bangles:{n:'Trio Bangles',p:'890 EGP',d:'Three slim stacking bangles in a polished finish — worn together or layered freely. Lightweight, adjustable, and crafted to accompany every look.',c:[
    {name:'Ivory',img:A.bangles,g:[A.bangles,A.baA1,A.baA2,A.baA3],s:'#e3d4cb'}
  ]}
};

let cart=[],currentPage='home',prodKey='wavvy',colorIdx=0,lbI=[],lbIdx=0;
let loaderStart=Date.now();

// ================================================
// LOADER
// ================================================
function hideLoader(){
  const l=document.getElementById('moi-loader');
  if(l){l.classList.add('moi-loader--hidden');setTimeout(()=>l.remove(),600)}
}
setTimeout(hideLoader,3500); // hard cap
function onHeroLoad(){
  const elapsed=Date.now()-loaderStart;
  setTimeout(hideLoader,Math.max(0,800-elapsed));
}

// ================================================
// PAGE SWITCH
// ================================================
function switchPage(page,pk,ci){
  const app=document.getElementById('moi-app');
  app.classList.add('is-exiting');
  setTimeout(()=>{
    currentPage=page;
    if(pk)prodKey=pk;
    if(ci!==undefined)colorIdx=ci;
    window.scrollTo(0,0);
    if(page==='home') app.innerHTML=renderHome();
    else if(page==='product') app.innerHTML=renderProduct();
    else if(page==='checkout') app.innerHTML=renderCheckout();
    app.classList.remove('is-exiting');
    document.querySelectorAll('.moi-demo-nav button').forEach((b,i)=>b.classList.toggle('active',i===(page==='home'?0:page==='product'?1:2)));
    initHeader();
    initFadeIn();
  },300);
}

// ================================================
// HEADER
// ================================================
function initHeader(){
  const h=document.getElementById('moi-header');
  if(!h)return;
  function update(){
    const s=window.scrollY>60;
    h.classList.toggle('moi-header--scrolled',s);
    h.classList.toggle('moi-header--transparent',!s);
  }
  window.addEventListener('scroll',update,{passive:true});
  update();
}

// ================================================
// FADE IN ON SCROLL
// ================================================
function initFadeIn(){
  const els=document.querySelectorAll('.moi-fade-in');
  const io=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('is-visible');io.unobserve(e.target)}});
  },{threshold:0.1,rootMargin:'-40px'});
  els.forEach(el=>io.observe(el));
}

// ================================================
// RENDER HEADER
// ================================================
function renderHeader(){
  const dark=currentPage==='product'||currentPage==='checkout';
  return `<header class="moi-header ${dark?'moi-header--dark':'moi-header--transparent'}" id="moi-header">
    <div class="moi-header__inner">
      <button class="moi-header__hamburger" onclick="toggleMenu()" aria-label="Open menu">
        <span class="moi-header__line"></span>
        <span class="moi-header__line moi-header__line--short"></span>
      </button>

function addToCart(pk,ci){
  const p=P[pk],c=p.c[ci];
  if(c.so)return;
  cart.push({n:p.n,c:c.name,p:p.p,img:c.img});
  updateCart();
  showToast('Added to bag');
}
function buyNow(pk,ci){cart=[];addToCart(pk,ci);switchPage('checkout')}
function removeCart(i){cart.splice(i,1);updateCart()}
function updateCart(){
  const el=document.getElementById('moi-cart-items');
  const total=cart.reduce((s,it)=>s+parseInt(it.p.replace(/\D/g,'')),0);
  if(cart.length===0){
    el.innerHTML=`<div class="moi-cart-drawer__empty">
      <svg class="moi-cart-drawer__empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <p class="moi-cart-drawer__empty-text">Your bag is empty</p>
    </div>`;
  } else {
    el.innerHTML=cart.map((it,i)=>`<div class="moi-cart-item">
      <div class="moi-cart-item__image"><img src="${it.img}" alt="${it.n}"></div>
      <div class="moi-cart-item__details">
        <p class="moi-cart-item__name">${it.n}</p>
        <p class="moi-cart-item__variant">${it.c}</p>
        <p class="moi-cart-item__price">${it.p}</p>
      </div>
      <button class="moi-cart-item__remove" onclick="removeCart(${i})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>`).join('');
  }
  document.getElementById('moi-cart-total').textContent=total.toLocaleString()+' EGP';
  const b=document.getElementById('moi-cart-badge');
  if(b){b.textContent=cart.length;b.style.display=cart.length>0?'flex':'none'}
}
function openCart(){document.getElementById('moi-cart-drawer').classList.add('is-open');document.getElementById('moi-cart-overlay').classList.add('is-open');document.body.style.overflow='hidden'}
function closeCart(){document.getElementById('moi-cart-drawer').classList.remove('is-open');document.getElementById('moi-cart-overlay').classList.remove('is-open');document.body.style.overflow=''}
function goToCheckout(){closeCart();switchPage('checkout')}
function showToast(msg){
  const t=document.createElement('div');t.className='moi-cart-toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}

// ================================================
// LIGHTBOX
// ================================================
function openLightbox(i){lbIdx=i;document.getElementById('moi-lightbox-img').src=lbI[i];document.getElementById('moi-lightbox').classList.add('is-open');document.body.style.overflow='hidden'}
function closeLightbox(e){if(e&&e.target!==e.currentTarget&&!e.target.closest('.moi-lightbox__close'))return;document.getElementById('moi-lightbox').classList.remove('is-open');document.body.style.overflow=''}
function lightboxPrev(e){e.stopPropagation();lbIdx=(lbIdx-1+lbI.length)%lbI.length;document.getElementById('moi-lightbox-img').src=lbI[lbIdx]}
function lightboxNext(e){e.stopPropagation();lbIdx=(lbIdx+1)%lbI.length;document.getElementById('moi-lightbox-img').src=lbI[lbIdx]}

// ================================================
// ACCORDION
// ================================================
function toggleAccordion(btn){
  const item=btn.closest('.moi-footer__accordion-item');
  const wasOpen=item.classList.contains('is-open');
  document.querySelectorAll('.moi-footer__accordion-item').forEach(i=>i.classList.remove('is-open'));
  if(!wasOpen)item.classList.add('is-open');
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('moi-app').innerHTML=renderHome();
  initHeader();initFadeIn();
});
