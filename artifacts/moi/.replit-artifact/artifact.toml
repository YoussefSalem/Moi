kind = "web"
previewPath = "/"
title = "Moi"
version = "1.0.0"
id = "artifacts/moi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18266

[services.development]
run = "pnpm --filter @workspace/moi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/moi", "run", "build" ]
publicDir = "artifacts/moi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18266"
BASE_PATH = "/"
