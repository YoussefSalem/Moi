<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Processing…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #faf8f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Montserrat', sans-serif;
    }
    .wrap {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(30,24,20,0.15);
      border-top-color: #1e1814;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p {
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(30,24,20,0.55);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="spinner"></div>
    <p>Processing</p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var success = params.get('success') === 'true';
      var txnId = params.get('id') || params.get('txn_id') || '';
      try {
        window.parent.postMessage(
          { type: 'PAYMOB_RESULT', success: success, transactionId: txnId },
          '*'
        );
      } catch (e) {
        // parent may be gone — ignore
      }
    })();
  </script>
</body>
</html>
