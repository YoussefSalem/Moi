<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOI — Payment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #faf8f5;
      font-family: 'Montserrat', sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 24px;
    }

    /* ── brand wordmark (only shown when top-level) ── */
    .brand {
      display: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      letter-spacing: 0.3em;
      color: #1e1814;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    /* ── result card ── */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      text-align: center;
    }

    .icon-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      flex-shrink: 0;
    }
    .icon-success  { background: rgba(47, 102, 68, 0.1); }
    .icon-pending  { background: rgba(160, 120, 40, 0.1); }
    .icon-fail     { background: rgba(180, 60, 40, 0.08); }

    h2 {
      font-size: 13px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #1e1814;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p.sub {
      font-size: 12px;
      letter-spacing: 0.04em;
      color: rgba(30, 24, 20, 0.55);
      line-height: 1.8;
      max-width: 300px;
    }

    /* ── single CTA button (success / pending) ── */
    .cta {
      display: none;
      margin-top: 32px;
      padding: 13px 36px;
      background: #1e1814;
      color: #faf8f5;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
    .cta:hover { opacity: 0.82; }

    /* ── 3-button group (fail only) ── */
    .fail-actions {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 32px;
      width: 100%;
      max-width: 320px;
    }
    .fail-actions .btn {
      width: 100%;
      padding: 13px 20px;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      border: none;
      text-align: center;
    }
    .fail-actions .btn-primary {
      background: #1e1814;
      color: #faf8f5;
    }
    .fail-actions .btn-primary:hover { opacity: 0.82; }
    .fail-actions .btn-outline {
      background: transparent;
      color: #1e1814;
      border: 1px solid #1e1814;
    }
    .fail-actions .btn-outline:hover { background: rgba(30,24,20,0.05); }
    .fail-actions .btn-ghost {
      background: transparent;
      color: rgba(30,24,20,0.45);
      border: 1px solid transparent;
    }
    .fail-actions .btn-ghost:hover { color: #1e1814; }

    /* ── countdown bar (success / pending only) ── */
    .countdown-wrap {
      display: none;
      margin-top: 20px;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: rgba(30,24,20,0.35);
    }
    .progress-bar {
      width: 120px;
      height: 2px;
      background: rgba(30,24,20,0.1);
      margin: 8px auto 0;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: rgba(30,24,20,0.3);
      width: 100%;
      transform-origin: left;
      animation: drain 5s linear forwards;
    }
    @keyframes drain { to { transform: scaleX(0); } }

    /* ── loading spinner (shown briefly before result renders) ── */
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .spinner {
      width: 30px;
      height: 30px;
      border: 2px solid rgba(30,24,20,0.12);
      border-top-color: #1e1814;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-label {
      font-size: 11px;
      letter-spacing: 0.18em;
      color: rgba(30,24,20,0.4);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="brand" id="brand">MOI</div>

  <div id="root" class="spinner-wrap">
    <div class="spinner"></div>
    <p class="spinner-label">Processing</p>
  </div>

  <script>
  (function () {
    var REDIRECT_DELAY = 7000;

    var params  = new URLSearchParams(window.location.search);
    var success = params.get('success') === 'true';
    var pending = !success && (params.get('pending') === 'true');
    var txnId   = params.get('id') || params.get('txn_id') || '';

    // ── determine outcome ──────────────────────────────────────────────────
    var outcome = success ? 'success' : (pending ? 'pending' : 'fail');

    var OUTCOMES = {
      success: {
        iconClass: 'icon-success',
        iconSvg: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2f6644" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
        title: 'Payment Successful',
        body: 'Your payment has been received successfully.<br>We\u2019ve sent your order for processing and will<br>keep you updated on the next steps.'
      },
      pending: {
        iconClass: 'icon-pending',
        iconSvg: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#a07828" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
        title: 'Payment Pending',
        body: 'Your payment is currently being verified.<br>This may take a few moments. We\u2019ll update<br>your order status as soon as confirmation is received.'
      },
      fail: {
        iconClass: 'icon-fail',
        iconSvg: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#b43c28" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
        title: 'Payment Failed',
        body: 'Unfortunately, your payment could not be processed.<br>Please try again or use a different payment method.'
      }
    };

    var o = OUTCOMES[outcome];

    // ── render result card ────────────────────────────────────────────────
    var root = document.getElementById('root');
    if (root) {
      root.className = 'card';
      root.innerHTML =
        '<div class="icon-circle ' + o.iconClass + '">' + o.iconSvg + '</div>' +
        '<h2>' + o.title + '</h2>' +
        '<p class="sub">' + o.body + '</p>';
    }

    // ── build postMessage payload ─────────────────────────────────────────
    var msg = { type: 'PAYMOB_RESULT', success: success, pending: pending, transactionId: txnId };

    // ── try to reach parent / opener ─────────────────────────────────────
    var sent = false;

    // Case 1 — loaded inside an iframe on our own site
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(msg, '*');
        sent = true;
      }
    } catch (e) {}

    // Case 2 — opened as a popup window
    if (!sent) {
      try {
        if (window.opener) {
          window.opener.postMessage(msg, '*');
          sent = true;
          setTimeout(function () { window.close(); }, 1400);
        }
      } catch (e) {}
    }

    // Case 3 — loaded as the top-level page (3DS navigated the main window).
    if (!sent) {
      // Save result so the app can pick it up on return
      try {
        sessionStorage.setItem('moi_paymob_result', JSON.stringify(msg));
      } catch (_) {}

      // Reveal the brand wordmark
      var brand = document.getElementById('brand');
      if (brand) brand.style.display = 'block';

      if (outcome === 'fail') {
        // ── Failure: show 3 action buttons, no auto-redirect ──────────────
        var actions = document.createElement('div');
        actions.className = 'fail-actions';
        actions.style.display = 'flex';

        // TRY AGAIN — keep moi_paymob_result in storage so app re-opens checkout
        var btnRetry = document.createElement('button');
        btnRetry.className = 'btn btn-primary';
        btnRetry.textContent = 'Try Again';
        btnRetry.onclick = function () { window.location.replace('/'); };

        // DIFFERENT METHOD — same flow, app shows checkout where user can switch method
        var btnMethod = document.createElement('button');
        btnMethod.className = 'btn btn-outline';
        btnMethod.textContent = 'Different Method';
        btnMethod.onclick = function () { window.location.replace('/'); };

        // CANCEL — clear storage so app does NOT re-open checkout
        var btnCancel = document.createElement('button');
        btnCancel.className = 'btn btn-ghost';
        btnCancel.textContent = 'Cancel';
        btnCancel.onclick = function () {
          try { sessionStorage.removeItem('moi_paymob_result'); } catch (_) {}
          window.location.replace('/');
        };

        actions.appendChild(btnRetry);
        actions.appendChild(btnMethod);
        actions.appendChild(btnCancel);
        document.body.appendChild(actions);

      } else {
        // ── Success / Pending: single CTA + countdown ─────────────────────
        var ctaLabel = success ? 'Proceed to Order Information' : 'Continue Shopping';
        var ctaDest = '/';

        var cta = document.createElement('a');
        cta.href = ctaDest;
        cta.className = 'cta';
        cta.textContent = ctaLabel;
        cta.style.display = 'inline-block';
        document.body.appendChild(cta);

        var cdWrap = document.createElement('div');
        cdWrap.className = 'countdown-wrap';
        cdWrap.style.display = 'block';
        var cdText = document.createElement('span');
        cdText.id = 'cd-text';
        var initialLabel = success ? 'Proceeding to your order in 5s\u2026' : 'Redirecting in 5s\u2026';
        cdText.textContent = initialLabel;
        cdWrap.appendChild(cdText);
        var bar = document.createElement('div');
        bar.className = 'progress-bar';
        var fill = document.createElement('div');
        fill.className = 'progress-fill';
        bar.appendChild(fill);
        cdWrap.appendChild(bar);
        document.body.appendChild(cdWrap);

        var secs = 5;
        var tick = setInterval(function () {
          secs--;
          var el = document.getElementById('cd-text');
          if (secs > 0) {
            if (el) el.textContent = (success ? 'Proceeding to your order in ' : 'Redirecting in ') + secs + 's\u2026';
          } else {
            if (el) el.textContent = success ? 'Opening your order\u2026' : 'Redirecting\u2026';
            clearInterval(tick);
            window.location.replace(ctaDest);
          }
        }, 1000);
      }
    }
  })();
  </script>
</body>
</html>
